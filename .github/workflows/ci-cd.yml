name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1 : Test ───────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      - name: Lint with flake8
        run: flake8 api/ dashboard/ tests/ --max-line-length=120

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=api --cov-fail-under=75
        env:
          API_KEY: test-secret

  # ── Job 2 : Build & Push ───────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-api:latest

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dashboard/Dockerfile
          push: true
          tags: ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-dashboard:latest

  # ── Job 3 : Deploy ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Deploy API to Azure Container Apps
        run: |
          az containerapp update \
            --name devops-monitor-api \
            --resource-group devops-monitor-rg \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-api:latest

      - name: Deploy Dashboard to Azure Container Apps
        run: |
          az containerapp update \
            --name devops-monitor-dashboard \
            --resource-group devops-monitor-rg \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-dashboard:latest